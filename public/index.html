  const linkEl = e.target.closest(".link-btn");
  if (linkEl) return; // anchor tag, let it open the URL
  if (c) { toggleItem(c.dataset.id); return; }
  if (del) { deleteItem(del.dataset.del); return; }
  // Otherwise, route to the row's bulk action (edit / find / link)
  const row = e.target.closest("[data-row]");
  if (!row) return;
  const id = row.dataset.row;
  const action = row.dataset.rowAction;
  if (action === "find") openFinder(id);
  else if (action === "link") {
    const it = state.items.find(i => i.id === id);
    if (it?.online_order_link) window.open(it.online_order_link, "_blank", "noopener");
  } else openEditItem(id);
});

/* ============ Live sync — version polling (Option B) ============
 * Every 10s while the page is visible, hit /api/list/version (~50 bytes).
 * Only do a full /api/list fetch when the version actually changed.
 * Polling stops when the tab is hidden and resumes on focus / visibility.
 */
const POLL_INTERVAL_MS = 10000;
let lastVersion = null;
let pollTimer = null;

async function checkVersion() {
  if (document.visibilityState !== "visible") return;
  try {
    const r = await api("/api/list/version");
    if (r && r.v && r.v !== lastVersion) {
      lastVersion = r.v;
      await refreshList();
    }
  } catch (_) { /* silent — next tick retries */ }
}
function startPolling() {
  stopPolling();
  pollTimer = setInterval(checkVersion, POLL_INTERVAL_MS);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") { checkVersion(); startPolling(); }
  else stopPolling();
});
window.addEventListener("focus", () => { checkVersion(); startPolling(); });
window.addEventListener("blur", stopPolling);
// Start once on load if already visible
if (document.visibilityState === "visible") startPolling();

/* ============ PWA ============ */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(reg => {
      // When a new SW activates after we've loaded, force a reload so the
      // user sees the latest deployment without manual cache clearing.
      let refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      // Nudge the browser to check for an updated SW on every load.
      if (reg) reg.update().catch(() => {});
    }).catch(() => {});
  });
}

// When embedded in dash dooo, localStorage is partitioned by the top-level
// origin — the token and apiUrl saved standalone are invisible here. Request
// them from the shell before booting so the app loads without manual re-entry.
// Stage 4 hooks used by sync-bridge.js (the module) to inject the session JWT
// and drive the standalone boot after resolving the magic-link session.
window.__shopBoot = boot;
window.__shopConfig = function () { return config; };
window.__applyShopSession = function (s) { if (s && s.jwt) config.token = s.jwt; };

(function () {
  var inDash = (function () {
    try { return !!window.parent && window.parent !== window; } catch (e) { return false; }
  })();
  // Standalone: defer to sync-bridge, which resolves the session (or shows the
  // sign-in overlay) and then calls window.__shopBoot().
  if (!inDash) { window.__shopStandalone = true; return; }

  var id = 'shop-cfg-' + Date.now();
  var timer;
  function handler(e) {
    if (!e.data || e.data.v !== 1 || e.data.type !== 'config-result' || e.data.id !== id) return;
    window.removeEventListener('message', handler);
    clearTimeout(timer);
    var cfg = e.data.config || {};
    console.log('[shop] config-result received, token present:', !!cfg.token);
    if (cfg.token)  config.token  = cfg.token;
    if (cfg.apiUrl) config.apiUrl = cfg.apiUrl;
    // Hydrate the saved theme from the shell's first-party store (iOS wipes
    // our own partitioned localStorage). No stored pref → keep dark default.
    if (cfg.prefs && cfg.prefs.theme) applyTheme(cfg.prefs.theme);
    boot();
  }
  window.addEventListener('message', handler);
  // 3s timeout: fall through to boot() even if the shell doesn't respond
  timer = setTimeout(function () {
    console.warn('[shop] config-request timed out — booting without injected token');
    window.removeEventListener('message', handler);
    boot();
  }, 3000);
  console.log('[shop] IN_DASH detected, requesting config from shell…');
  window.parent.postMessage({ v: 1, type: 'config-request', id: id, app: 'shop' }, '*');
})();
</script>

     — the classic script keeps its online path; only offline reads/mutations use
     this. Falls back gracefully if IndexedDB is unavailable. -->
