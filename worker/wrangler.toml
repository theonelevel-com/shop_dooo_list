name = "shop-dooo-api"
main = "src/index.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# NOTE: a custom domain on the dooolist.com zone was tried (api.shop.dooolist.com)
# but dash's Pages Functions live on the SAME zone (dash.dooolist.com), and
# Cloudflare blocks Worker→Worker fetches within one zone (error 1042). So the
# worker stays on workers.dev (cross-zone from dash) and dash reaches it fine.
# The proper dooolist-domain path is a Worker service binding (deferred item).
# The health JSON still reports service:"shop-dooo-api" for branding.

# Bind a D1 database. After running `wrangler d1 create shopwise`,
# paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "shopwise"
database_id = "b820ea69-9235-4a35-afa7-2f5de33ef756"

# Stage 4: the shared `dooo` database (auth tables) — bound read-mostly here so
# the worker verifies the same session JWTs / api_tokens as dooo-api. Multi-
# worker binding of one D1 is supported.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "dooo"
database_id = "a81d7ad5-940c-48ef-99f4-64176bbdd686"

# Error telemetry currently goes to Worker logs via reportError(). To upgrade to a
# queryable Analytics Engine dataset later: enable Analytics Engine on the account,
# then uncomment:
#   [[analytics_engine_datasets]]
#   binding = "ERRORS"
#   dataset = "dooo_errors"

[vars]
# Public, non-secret env vars go here.
# Secrets (SHOPWISE_AUTH_TOKEN, DEEPSEEK_API_KEY, ANTHROPIC_API_KEY) are set via:
#   npx wrangler secret put SHOPWISE_AUTH_TOKEN
#   npx wrangler secret put DEEPSEEK_API_KEY
#   npx wrangler secret put ANTHROPIC_API_KEY   (only if you want claude-* resolver)

# Optional: comma-separated allowed origins for CORS. Leave empty for "*".
ALLOWED_ORIGINS = ""

# AI resolver: when "on", the Worker calls an LLM to interpret items the
# strict resolver can't match exactly. New products it deduces get a
# `pending_review` flag (visible in Admin → Products). Default off so the
# behaviour matches today's until you've set DEEPSEEK_API_KEY.
RESOLVER_AI_MODE = "off"
RESOLVER_MODEL   = "deepseek-chat"

# Price-checking agent: same on/off; the cron handler skips when off.
# When on, scans product_locations rows whose indicative_price_updated_at
# is older than PRICE_REFRESH_DAYS (or null) and asks the LLM for an
# updated indicative price.
PRICE_CHECK_MODE   = "off"
PRICE_REFRESH_DAYS = "30"

# Observability
[observability]
enabled = true

# Daily 06:00 UTC price-check sweep (no-op when PRICE_CHECK_MODE=off).
[triggers]
crons = ["0 6 * * *"]
